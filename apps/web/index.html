<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lotto Helper</title>
    <style>
      :root {
        --text: #fff7ea;
        --muted: #fcd9a4;
        --panel: rgba(255, 255, 255, 0.09);
        --border: rgba(255, 235, 203, 0.3);
        --shadow: 0 22px 50px rgba(0, 0, 0, 0.42);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: var(--text);
        background:
          radial-gradient(1000px 500px at -10% -8%, #ef4444 0%, transparent 65%),
          radial-gradient(900px 450px at 110% 2%, #f59e0b 0%, transparent 62%),
          linear-gradient(155deg, #130904 0%, #2a1208 40%, #3a1608 100%);
        min-height: 100vh;
      }

      .app-shell {
        width: min(980px, 92vw);
        margin: 24px auto 36px;
        position: relative;
      }

      .bg-orb {
        position: absolute;
        border-radius: 999px;
        filter: blur(40px);
        z-index: -1;
      }
      .orb-a { width: 180px; height: 180px; background: rgba(255, 80, 80, 0.35); top: 30px; left: -25px; }
      .orb-b { width: 230px; height: 230px; background: rgba(251, 191, 36, 0.28); right: -35px; top: 140px; }
      .orb-c { width: 180px; height: 180px; background: rgba(244, 114, 182, 0.2); left: 45%; top: 320px; }

      .glass {
        background: var(--panel);
        border: 1px solid var(--border);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: var(--shadow);
      }

      .jackpot-ticker {
        border-radius: 14px;
        padding: 10px 0;
        margin-bottom: 12px;
        overflow: hidden;
        border-color: rgba(252, 211, 77, 0.35);
      }

      .ticker-track {
        display: flex;
        width: max-content;
        animation: ticker 18s linear infinite;
        white-space: nowrap;
        font-weight: 800;
        color: #fde68a;
      }
      .ticker-track span { padding-right: 36px; }

      @keyframes ticker {
        from { transform: translateX(0); }
        to { transform: translateX(-50%); }
      }

      .hero {
        border-radius: 24px;
        padding: 26px;
      }

      h1 {
        margin: 6px 0 10px;
        font-size: clamp(2rem, 4vw, 2.7rem);
        line-height: 1.05;
      }

      .kicker {
        margin: 0;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 0.75rem;
        color: #ffd166;
        font-weight: 800;
      }

      .muted { color: var(--muted); }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 20px;
      }

      .btn {
        border: 0;
        border-radius: 12px;
        padding: 11px 16px;
        color: white;
        cursor: pointer;
        font-weight: 800;
        transition: transform 120ms ease, opacity 120ms ease;
      }
      .btn:hover { transform: translateY(-1px) scale(1.01); }
      .btn:disabled { opacity: 0.68; cursor: not-allowed; transform: none; }

      .btn-primary {
        background: linear-gradient(140deg, #ef4444 0%, #dc2626 55%, #b91c1c 100%);
        box-shadow: 0 10px 25px rgba(220, 38, 38, 0.35);
      }
      .btn-secondary {
        background: linear-gradient(140deg, #f59e0b 0%, #d97706 60%, #b45309 100%);
        box-shadow: 0 10px 25px rgba(217, 119, 6, 0.35);
      }
      .btn-favorite {
        background: linear-gradient(140deg, #f97316 0%, #ea580c 55%, #c2410c 100%);
        box-shadow: 0 10px 25px rgba(234, 88, 12, 0.35);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 14px;
        margin-top: 16px;
      }

      .card {
        border-radius: 20px;
        padding: 18px;
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }

      .card h3 { margin: 0; font-size: 1.08rem; }

      .chip {
        font-size: 0.72rem;
        font-weight: 800;
        padding: 5px 9px;
        border-radius: 999px;
        color: #fecaca;
        background: rgba(220, 38, 38, 0.2);
        border: 1px solid rgba(252, 165, 165, 0.35);
      }

      .chip.gold {
        color: #ffedb4;
        background: rgba(245, 158, 11, 0.22);
        border-color: rgba(252, 211, 77, 0.45);
      }

      .fav-card { margin-top: 14px; }
      .fav-help { margin: 8px 0 10px; }
      .fav-summary-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .fav-summary {
        margin: 0;
      }
      .favorites-grid {
        display: grid;
        grid-template-columns: repeat(10, minmax(0, 1fr));
        gap: 7px;
        margin-bottom: 10px;
      }
      .fav-pill {
        border: 1px solid rgba(255, 228, 195, 0.35);
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.16);
        color: #ffe8c4;
        font-weight: 700;
        cursor: pointer;
        padding: 6px 0;
      }
      .fav-pill.active {
        background: linear-gradient(140deg, #f59e0b 0%, #d97706 100%);
        border-color: rgba(252, 211, 77, 0.8);
        color: #fff;
      }

      .numbers {
        display: flex;
        gap: 9px;
        flex-wrap: wrap;
        margin: 14px 0;
      }

      .ball {
        width: 44px;
        height: 44px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        font-weight: 800;
        color: #fff;
        background: linear-gradient(145deg, #ef4444 0%, #b91c1c 100%);
        border: 1px solid rgba(255, 229, 210, 0.42);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.28);
      }

      .reveal {
        animation: popIn 520ms cubic-bezier(.2,.9,.2,1) both;
      }
      @keyframes popIn {
        0% { transform: translateY(8px) scale(0.8); opacity: 0; }
        60% { transform: translateY(-3px) scale(1.06); opacity: 1; }
        100% { transform: translateY(0) scale(1); opacity: 1; }
      }

      .bonus {
        width: auto;
        min-width: 58px;
        padding: 0 12px;
        background: linear-gradient(145deg, #f59e0b 0%, #b45309 100%);
      }

      .quick-store {
        background: rgba(0, 0, 0, 0.18);
        border: 1px solid rgba(255, 228, 195, 0.2);
        border-radius: 14px;
        padding: 12px;
      }

      .quick-title {
        margin: 0;
        font-size: 1rem;
        font-weight: 800;
      }

      .quick-sub {
        margin: 8px 0 0;
        color: var(--muted);
      }

      .actions-inline { margin-top: 10px; }

      .text-btn {
        background: transparent;
        border: 1px solid rgba(255, 228, 195, 0.35);
        color: #ffe8c4;
        border-radius: 10px;
        padding: 7px 10px;
        font-weight: 700;
        cursor: pointer;
      }

      .details { margin-top: 12px; }

      .details p {
        margin: 8px 0;
        display: flex;
        justify-content: space-between;
        gap: 20px;
      }

      .details span { color: var(--muted); }
      a { color: #fde68a; }
      .warn { color: #fde68a; margin-top: 10px; }
      .error { margin-top: 14px; color: #fecdd3; font-weight: 700; }

      @media (max-width: 780px) {
        .favorites-grid { grid-template-columns: repeat(8, minmax(0, 1fr)); }
      }

      @media (max-width: 640px) {
        .app-shell { margin-top: 14px; }
        .hero { padding: 20px; }
        .favorites-grid { grid-template-columns: repeat(6, minmax(0, 1fr)); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
